version: '3.9'

services:
  db:
    image: mysql:8.1
    container_name: ihub-mysql
    environment:
      MYSQL_DATABASE: ihub
      MYSQL_ROOT_PASSWORD: root
    ports:
      - '3306:3306'
    volumes:
      - ihub_mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysql', '-uroot', '-proot', '-e', 'SELECT 1']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.4
    container_name: ihub-elasticsearch
    environment:
      - node.name=es01
      - discovery.type=single-node
      - cluster.name=ihub-cluster
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - ELASTIC_PASSWORD=elastic123
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=false
      - xpack.security.transport.ssl.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - '9200:9200'
    volumes:
      - ihub_es_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  backend:
    build: .
    image: ihub-backend
    container_name: ihub-backend
    ports:
      - '8081:8081'
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/ihub
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      SPRING_ELASTICSEARCH_USERNAME: elastic
      SPRING_ELASTICSEARCH_PASSWORD: elastic123
    depends_on:
      - db
      - elasticsearch
    restart: unless-stopped

volumes:
  ihub_mysql_data:
  ihub_es_data:
