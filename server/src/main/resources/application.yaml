server:
  port: ${PORT:8081}

spring:
  application:
    name: ihub-bidding-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  elasticsearch:
    uris: ${ES_URL}
    username: ${ES_USERNAME}
    password: ${ES_PASSWORD}

  jdbc:
    template:
      query-timeout: 30s

  sql:
    init:
      mode: always
      platform: mysql

  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration: ${JWT_EXPIRATION:3600000}
      refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

auction:
  cron:
    lifecycle: "0 */1 * * * *"
  default-min-bid-increment: 100

search:
  default-page-size: 20
  max-page-size: 100

ihub:
  notification:
    email-enabled: ${EMAIL_ENABLED:false}
    from-address: ${EMAIL_FROM:noreply@ihub.com}
    outbox:
      batch-size: 20
      max-attempts: 3
      cron: "0 */2 * * * *"

logging:
  level:
    root: INFO
    org.springframework.jdbc.core.JdbcTemplate: DEBUG