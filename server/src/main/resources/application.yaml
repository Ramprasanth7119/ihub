server:
  port: 8081

spring:
  application:
    name: ihub-bidding-service
  elasticsearch:
    uris: http://localhost:9200
    username: elastic
    password: elastic123

  # MySQL Database Configuration
  datasource:
    # Add your database name (ihub_db) after the slash
    url: jdbc:mysql://localhost:3306/ihub
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JdbcTemplate & SQL Settings
  jdbc:
    template:
      query-timeout: 30s
  
  # Manual SQL Script Initialization (Optional but helpful)
  sql:
    init:
      mode: always
      platform: mysql

  # JWT Security Properties
  security:
    jwt:
      secret: thecrazyfoxjumpsoverthelazybrownfox1309
      expiration: 3600000
      refresh-expiration: 604800000

  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

# Auction lifecycle scheduler (checks start_time / end_time every minute)
auction:
  cron:
    lifecycle: "0 */1 * * * *"
  default-min-bid-increment: 100

search:
  default-page-size: 20
  max-page-size: 100

ihub:
  notification:
    email-enabled: false
    from-address: noreply@ihub.local
    outbox:
      batch-size: 20
      max-attempts: 3
      cron: "0 */2 * * * *"

logging:
  level:
    root: INFO
    org.springframework.jdbc.core.JdbcTemplate: DEBUG